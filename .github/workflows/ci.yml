name: Gravity CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  # ── Secrets obrigatórios — configure em Settings > Secrets and variables > Actions
  # CLERK_SECRET_KEY, STRIPE_SECRET_KEY, CHAVE_SERVICO_INTERNO, etc.

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Install & Lint
  # ─────────────────────────────────────────────
  install-lint:
    name: Install & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: TypeScript typecheck
        run: npx tsc --noEmit
        continue-on-error: true # não bloqueia CI por erros de tipo ainda

  # ─────────────────────────────────────────────
  # JOB 1.5 — Monorepo Check (deps, versions, patterns)
  # ─────────────────────────────────────────────
  monorepo-check:
    name: Monorepo Check
    runs-on: ubuntu-latest
    needs: install-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check monorepo rules (versions, type:module, overrides)
        run: npm run check:deps

      - name: Check for duplicate dependencies
        run: |
          echo "Verificando duplicatas de libs criticas..."
          DUPES=""
          for lib in react zustand i18next express @prisma/client; do
            COUNT=$(npm ls "$lib" 2>/dev/null | grep -E "── ${lib}@[0-9]" | grep -v deduped | sed "s/.*${lib}@/${lib}@/" | sort -u | wc -l)
            if [ "$COUNT" -gt 1 ]; then
              DUPES="$DUPES\n  $lib tem $COUNT versoes diferentes"
            fi
          done
          if [ -n "$DUPES" ]; then
            echo -e "❌ Dependencias duplicadas encontradas:$DUPES"
            exit 1
          fi
          echo "✅ Nenhuma duplicata critica encontrada"

  # ─────────────────────────────────────────────
  # JOB 1.6 — Security Audit (npm audit)
  # ─────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: install-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Check for known vulnerable patterns
        run: |
          echo "Verificando secrets hardcoded no codigo..."
          if grep -rn "sk_live_\|sk_test_[a-zA-Z0-9]\{20,\}\|AKIA[0-9A-Z]\{16\}" --include="*.ts" --include="*.tsx" --exclude-dir=node_modules --exclude-dir=.env* . ; then
            echo "ALERTA: Possivel secret hardcoded encontrado!"
            exit 1
          fi
          echo "Nenhum secret hardcoded encontrado."

  # ─────────────────────────────────────────────
  # JOB 2 — Unit & Functional Tests (Vitest)
  # ─────────────────────────────────────────────
  test:
    name: Run Tests (Vitest)
    runs-on: ubuntu-latest
    needs: [install-lint, monorepo-check]

    env:
      # Valores de teste — não são segredos reais
      NODE_ENV: test
      CHAVE_SERVICO_INTERNO: ci-test-internal-key
      CLERK_SECRET_KEY: sk_test_placeholder
      CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      CONFIGURADOR_DATABASE_URL: postgresql://test:test@localhost:5432/configurador_test
      ORGANIZACAO_DATABASE_URL: postgresql://test:test@localhost:5432/organizacao_test
      SIMULACUSTO_DATABASE_URL: postgresql://test:test@localhost:5432/simulacusto_test
      RESEND_API_KEY: re_placeholder
      WHATSAPP_ACCESS_TOKEN: wa_placeholder
      WHATSAPP_PHONE_NUMBER_ID: "000000000000"
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: verify_placeholder
      OPENAI_API_KEY: sk-placeholder
      SENTRY_DSN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run all tests
        run: npx vitest run --reporter=verbose
        timeout-minutes: 10

  # ─────────────────────────────────────────────
  # JOB 3 — Build (serviços com script "build")
  # ─────────────────────────────────────────────
  build-services:
    name: Build Services
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        service:
          - path: servicos-global/configurador
            name: configurador
          - path: servicos-global/servicos-plataforma/dashboard
            name: dashboard
          - path: servicos-global/servicos-plataforma/relatorios
            name: relatorios
          - path: servicos-global/servicos-plataforma/cronometro
            name: cronometro
          - path: servicos-global/servicos-plataforma/notificacoes
            name: notificacoes
          - path: servicos-global/servicos-plataforma/historico-global
            name: historico
          - path: servicos-global/servicos-plataforma/gabi
            name: gabi
          - path: servicos-global/servicos-plataforma/api-cockpit
            name: api-cockpit
          - path: servicos-global/servicos-plataforma/conector-erp
            name: conector-erp
          - path: servicos-global/servicos-plataforma/agendamento
            name: agendamento
          - path: servicos-global/servicos-plataforma/whatsapp
            name: whatsapp
          - path: produto/simula-custo
            name: simula-custo
          - path: servicos-global/marketplace
            name: marketplace

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.service.name }}
        working-directory: ${{ matrix.service.path }}
        run: |
          if [ -f "package.json" ] && cat package.json | grep -q '"build"'; then
            npm run build
          else
            echo "Serviço ${{ matrix.service.name }} não possui script build — pulando."
          fi

  # ─────────────────────────────────────────────
  # JOB 4 — Notificação de Status (opcional)
  # ─────────────────────────────────────────────
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [test, build-services]
    if: always()
    steps:
      - name: Pipeline result
        run: |
          if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.build-services.result }}" = "success" ]; then
            echo "✅ CI passou — todos os testes e builds OK"
          else
            echo "❌ CI falhou — verifique os logs acima"
            exit 1
          fi
