name: Gravity Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Testes (obrigatório antes de qualquer deploy)
  # ─────────────────────────────────────────────
  test:
    name: Run Tests (Vitest)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      CONFIGURADOR_DATABASE_URL: postgresql://test:test@localhost:5432/configurador_test
      TENANT_DATABASE_URL: postgresql://test:test@localhost:5432/tenant_test
      CLERK_SECRET_KEY: sk_test_placeholder
      INTERNAL_SERVICE_KEY: ci-internal-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm install
      - run: npx vitest run --reporter=verbose
        timeout-minutes: 10

  # ─────────────────────────────────────────────
  # JOB 2 — Validar schemas Prisma (integridade)
  # ─────────────────────────────────────────────
  validate-schemas:
    name: Validate Prisma Schemas
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm install

      - name: Compor schema do Tenant DB
        run: npx ts-node scripts/compose-tenant-schema.ts --strict

      - name: Validar schema do Configurador
        run: npx prisma validate --schema=configurador/prisma/schema.prisma

      - name: Validar schema do Tenant DB
        run: npx prisma validate --schema=servicos-global/tenant/prisma/schema.prisma

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy em Staging (T26000001) + Migrations
  # ─────────────────────────────────────────────
  deploy-staging:
    name: "Deploy Staging (T26000001)"
    runs-on: ubuntu-latest
    needs: validate-schemas
    environment: staging
    env:
      CONFIGURADOR_DATABASE_URL: ${{ secrets.STAGING_CONFIGURADOR_DATABASE_URL }}
      TENANT_DATABASE_URL: ${{ secrets.STAGING_TENANT_DATABASE_URL }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
    steps:
      - name: Validar secrets obrigatórios (Staging)
        run: |
          missing=""
          if [ -z "${{ secrets.STAGING_CONFIGURADOR_DATABASE_URL }}" ]; then missing="$missing STAGING_CONFIGURADOR_DATABASE_URL"; fi
          if [ -z "${{ secrets.STAGING_TENANT_DATABASE_URL }}" ]; then missing="$missing STAGING_TENANT_DATABASE_URL"; fi
          if [ -z "${{ secrets.RAILWAY_TOKEN_STAGING }}" ]; then missing="$missing RAILWAY_TOKEN_STAGING"; fi
          if [ -z "${{ secrets.CLERK_SECRET_KEY }}" ]; then missing="$missing CLERK_SECRET_KEY"; fi
          if [ -n "$missing" ]; then echo "Missing required secrets:$missing"; exit 1; fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm install

      - name: Aplicar migrations — Configurador DB (Staging)
        run: |
          npx prisma migrate deploy \
            --schema=configurador/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.STAGING_CONFIGURADOR_DATABASE_URL }}

      - name: Aplicar migrations — Tenant DB (Staging)
        run: |
          npx ts-node scripts/compose-tenant-schema.ts
          npx prisma migrate deploy \
            --schema=servicos-global/tenant/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.STAGING_TENANT_DATABASE_URL }}

      - name: Registrar versão de staging (T26000001)
        run: |
          STAGING_CONF=$(npx prisma migrate status \
            --schema=configurador/prisma/schema.prisma 2>&1 | grep "Database schema is up to date" | wc -l)
          STAGING_TENANT=$(npx prisma migrate status \
            --schema=servicos-global/tenant/prisma/schema.prisma 2>&1 | grep "Database schema is up to date" | wc -l)
          echo "STAGING_CONF_OK=$STAGING_CONF" >> $GITHUB_ENV
          echo "STAGING_TENANT_OK=$STAGING_TENANT" >> $GITHUB_ENV

      # Health check após deploy de staging
      - name: Health check — Configurador (Staging)
        run: |
          sleep 30
          curl -f https://configurador-staging.up.railway.app/health || exit 1

  # ─────────────────────────────────────────────
  # JOB 4 — GATE DE PARIDADE T26000001 → P26000001
  # Bloqueia se schemas divergem entre Staging e Produção
  # ─────────────────────────────────────────────
  schema-parity-gate:
    name: "Gate de Paridade Schemas T→P"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    env:
      STAGING_CONFIGURADOR_URL: ${{ secrets.STAGING_CONFIGURADOR_DATABASE_URL }}
      STAGING_TENANT_URL: ${{ secrets.STAGING_TENANT_DATABASE_URL }}
      PROD_CONFIGURADOR_URL: ${{ secrets.PROD_CONFIGURADOR_DATABASE_URL }}
      PROD_TENANT_URL: ${{ secrets.PROD_TENANT_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm install

      - name: "Verificar paridade — Configurador DB (T vs P)"
        run: |
          echo "Verificando paridade de migrations no Configurador DB..."
          STAGING_STATUS=$(DATABASE_URL=$STAGING_CONFIGURADOR_URL npx prisma migrate status \
            --schema=configurador/prisma/schema.prisma 2>&1)
          PROD_STATUS=$(DATABASE_URL=$PROD_CONFIGURADOR_URL npx prisma migrate status \
            --schema=configurador/prisma/schema.prisma 2>&1)

          STAGING_MIGS=$(echo "$STAGING_STATUS" | grep -c "migration name" || echo "0")
          PROD_MIGS=$(echo "$PROD_STATUS" | grep -c "migration name" || echo "0")

          echo "Migrations em Staging (T26000001): $STAGING_MIGS"
          echo "Migrations em Produção (P26000001): $PROD_MIGS"

          if [ "$STAGING_MIGS" != "$PROD_MIGS" ]; then
            echo "❌ GATE BLOQUEADO: Schemas do Configurador divergem entre Staging e Produção."
            echo "   T26000001: $STAGING_MIGS migrations | P26000001: $PROD_MIGS migrations"
            echo "   Aplique as migrations pendentes em Produção antes de promover."
            exit 1
          fi
          echo "✅ Configurador DB: paridade confirmada ($STAGING_MIGS migrations em ambos)"

      - name: "Verificar paridade — Tenant DB (T vs P)"
        run: |
          echo "Verificando paridade de migrations no Tenant DB..."
          STAGING_STATUS=$(DATABASE_URL=$STAGING_TENANT_URL npx prisma migrate status \
            --schema=servicos-global/tenant/prisma/schema.prisma 2>&1)
          PROD_STATUS=$(DATABASE_URL=$PROD_TENANT_URL npx prisma migrate status \
            --schema=servicos-global/tenant/prisma/schema.prisma 2>&1)

          STAGING_MIGS=$(echo "$STAGING_STATUS" | grep -c "migration name" || echo "0")
          PROD_MIGS=$(echo "$PROD_STATUS" | grep -c "migration name" || echo "0")

          echo "Migrations em Staging (T26000001): $STAGING_MIGS"
          echo "Migrations em Produção (P26000001): $PROD_MIGS"

          if [ "$STAGING_MIGS" != "$PROD_MIGS" ]; then
            echo "❌ GATE BLOQUEADO: Schemas do Tenant DB divergem entre Staging e Produção."
            echo "   T26000001: $STAGING_MIGS migrations | P26000001: $PROD_MIGS migrations"
            echo "   Aplique as migrations pendentes em Produção antes de promover."
            exit 1
          fi
          echo "✅ Tenant DB: paridade confirmada ($STAGING_MIGS migrations em ambos)"

      - name: "✅ Gate aprovado — Staging e Produção em paridade"
        run: echo "Schemas idênticos em T26000001 e P26000001. Promovendo para produção..."

  # ─────────────────────────────────────────────
  # JOB 5 — Deploy em Produção (P26000001)
  # Só executa após aprovação manual + gate de paridade
  # ─────────────────────────────────────────────
  deploy-production:
    name: "Deploy Produção (P26000001)"
    runs-on: ubuntu-latest
    needs: schema-parity-gate
    environment: production  # requer aprovação manual no GitHub
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
    steps:
      - name: Validar secrets obrigatórios (Produção)
        run: |
          missing=""
          if [ -z "${{ secrets.PROD_CONFIGURADOR_DATABASE_URL }}" ]; then missing="$missing PROD_CONFIGURADOR_DATABASE_URL"; fi
          if [ -z "${{ secrets.PROD_TENANT_DATABASE_URL }}" ]; then missing="$missing PROD_TENANT_DATABASE_URL"; fi
          if [ -z "${{ secrets.RAILWAY_TOKEN_PRODUCTION }}" ]; then missing="$missing RAILWAY_TOKEN_PRODUCTION"; fi
          if [ -z "${{ secrets.CLERK_SECRET_KEY }}" ]; then missing="$missing CLERK_SECRET_KEY"; fi
          if [ -n "$missing" ]; then echo "Missing required secrets:$missing"; exit 1; fi
      - uses: actions/checkout@v4

      - name: Aplicar migrations — Configurador DB (Produção)
        run: |
          npx prisma migrate deploy \
            --schema=configurador/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.PROD_CONFIGURADOR_DATABASE_URL }}

      - name: Aplicar migrations — Tenant DB (Produção)
        run: |
          npx prisma migrate deploy \
            --schema=servicos-global/tenant/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.PROD_TENANT_DATABASE_URL }}

      - name: Health check — Configurador (Produção)
        run: |
          sleep 30
          curl -f https://configurador.up.railway.app/health || exit 1

      - name: "✅ Deploy de Produção concluído (P26000001)"
        run: echo "Deploy em produção finalizado com sucesso."
