<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cores por Role — Gravity</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      margin: 0;
    }

    h2 {
      color: #94a3b8;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0;
    }

    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .cards {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Simula o componente UsuarioGlobal */
    .user-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 12px 4px 5px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(129, 140, 248, 0.15);
      backdrop-filter: blur(8px);
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1e293b;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 11px;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .name {
      font-size: 13.5px;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: -0.01em;
    }

    .role {
      font-size: 10.5px;
      font-weight: 800;
      line-height: 1;
    }

    /* Cores dark */
    .role--super-admin { color: #22c55e; text-shadow: 0 0 8px rgba(34,197,94,0.3); }
    .role--admin       { color: #06b6d4; }
    .role--master      { color: #818cf8; }
    .role--standard    { color: #94a3b8; }
    .role--fornecedor  { color: #fbbf24; }

    /* Avatar Super Admin */
    .avatar--super-admin {
      border: 1px solid rgba(34,197,94,0.4);
      color: #22c55e;
      background: rgba(34,197,94,0.12);
    }

    /* ── Light theme ── */
    .light-bg {
      background: #f1f5f9;
      padding: 1.5rem 2rem;
      border-radius: 16px;
    }

    .user-btn--light {
      background: rgba(255,255,255,0.88);
      border-color: #cbd5e1;
    }

    .name--light { color: #0f172a; }

    .role--super-admin-light { color: #047857; }
    .role--admin-light       { color: #0e7490; }
    .role--master-light      { color: #4f46e5; }
    .role--standard-light    { color: #64748b; }
    .role--fornecedor-light  { color: #b45309; }
  </style>
</head>
<body>

  <div class="section">
    <h2>Tema Escuro</h2>
    <div class="cards">

      <div class="user-btn">
        <div class="avatar avatar--super-admin">DA</div>
        <div class="info">
          <span class="name">Daniel</span>
          <span class="role role--super-admin">Super Admin</span>
        </div>
      </div>

      <div class="user-btn">
        <div class="avatar">JA</div>
        <div class="info">
          <span class="name">João</span>
          <span class="role role--admin">Admin</span>
        </div>
      </div>

      <div class="user-btn">
        <div class="avatar">MA</div>
        <div class="info">
          <span class="name">Maria</span>
          <span class="role role--master">Master</span>
        </div>
      </div>

      <div class="user-btn">
        <div class="avatar">CA</div>
        <div class="info">
          <span class="name">Carlos</span>
          <span class="role role--standard">Standard</span>
        </div>
      </div>

      <div class="user-btn">
        <div class="avatar">FO</div>
        <div class="info">
          <span class="name">Fornecedor</span>
          <span class="role role--fornecedor">Fornecedor</span>
        </div>
      </div>

    </div>
  </div>

  <div class="section">
    <h2>Tema Claro</h2>
    <div class="light-bg">
      <div class="cards">

        <div class="user-btn user-btn--light">
          <div class="avatar avatar--super-admin">DA</div>
          <div class="info">
            <span class="name name--light">Daniel</span>
            <span class="role role--super-admin-light">Super Admin</span>
          </div>
        </div>

        <div class="user-btn user-btn--light">
          <div class="avatar">JA</div>
          <div class="info">
            <span class="name name--light">João</span>
            <span class="role role--admin-light">Admin</span>
          </div>
        </div>

        <div class="user-btn user-btn--light">
          <div class="avatar">MA</div>
          <div class="info">
            <span class="name name--light">Maria</span>
            <span class="role role--master-light">Master</span>
          </div>
        </div>

        <div class="user-btn user-btn--light">
          <div class="avatar">CA</div>
          <div class="info">
            <span class="name name--light">Carlos</span>
            <span class="role role--standard-light">Standard</span>
          </div>
        </div>

        <div class="user-btn user-btn--light">
          <div class="avatar">FO</div>
          <div class="info">
            <span class="name name--light">Fornecedor</span>
            <span class="role role--fornecedor-light">Fornecedor</span>
          </div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
