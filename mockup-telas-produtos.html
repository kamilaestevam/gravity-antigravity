<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gravity — Mockup de Zonas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#162032;
  --border:rgba(255,255,255,0.07);--text:#f1f5f9;--muted:#94a3b8;--muted2:#475569;
  --radius:8px;--header-h:56px;--sidebar-w:220px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

/* ── Layout ── */
.layout{display:grid;grid-template-areas:"topo topo" "lateral conteudo";grid-template-rows:var(--header-h) 1fr;grid-template-columns:var(--sidebar-w) 1fr;height:100vh}

/* ── Header ── */
.header{grid-area:topo;background:var(--bg);border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;gap:.5rem;position:relative;z-index:10}
.h-left{display:flex;align-items:center;gap:.5rem}
.h-logo{display:flex;align-items:center;gap:.375rem}
.h-logo svg{opacity:.9}
.h-logo-name{font-size:.8125rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.h-divider{width:1px;height:18px;background:rgba(255,255,255,0.08)}
.h-chip{display:inline-flex;align-items:center;gap:.375rem;padding:.25rem .625rem .25rem .5rem;border-radius:9999px;border:1px solid var(--chip-border,rgba(129,140,248,.22));background:var(--chip-bg,rgba(129,140,248,.08));font-size:.8rem;font-weight:700;color:var(--chip-color,#818cf8)}
.h-chip-icon{display:flex;align-items:center;opacity:.9}
.h-right{display:flex;align-items:center;gap:.125rem;margin-left:auto}
.h-icon{width:32px;height:32px;border-radius:var(--radius);border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:.15s}
.h-icon:hover{background:rgba(255,255,255,.06);color:var(--text)}
.h-sep{width:1px;height:20px;background:rgba(255,255,255,.07);margin:0 .375rem}
.h-nav-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .625rem;border-radius:9999px;border:1px solid var(--nb-border);background:var(--nb-bg);color:var(--nb-color);font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.h-nav-btn:hover{background:var(--nb-bg-h);border-color:var(--nb-border-h)}
.h-avatar{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;cursor:pointer;color:var(--text)}

/* ── Sidebar ── */
.sidebar{grid-area:lateral;background:linear-gradient(180deg,var(--sb-accent-dim,rgba(129,140,248,.06)) 0%,var(--surface) 120px);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-logo-area{display:flex;align-items:center;gap:.5rem;padding:28px 1rem 20px 1.25rem;border-bottom:1px solid var(--border)}
.sb-chip{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .5rem;background:var(--sb-accent-dim,rgba(129,140,248,.08));border:1px solid var(--sb-accent-border,rgba(129,140,248,.22));border-radius:9999px;margin-left:auto}
.sb-chip-dot{width:5px;height:5px;min-width:5px;border-radius:50%;background:var(--sb-accent,#818cf8);box-shadow:0 0 6px var(--sb-accent,#818cf8)}
.sb-chip-label{font-size:.5rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--sb-accent,#818cf8)}
.sb-tenant{display:flex;align-items:center;gap:.625rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);background:rgba(0,0,0,.05)}
.sb-avatar{width:32px;height:32px;min-width:32px;border-radius:8px;border:1px solid var(--sb-accent-border,rgba(129,140,248,.3));background:var(--sb-accent-dim,rgba(129,140,248,.1));color:var(--sb-accent,#818cf8);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem}
.sb-tenant-info{display:flex;flex-direction:column;gap:1px}
.sb-tenant-name{font-size:.8125rem;font-weight:600}
.sb-tenant-plan{font-size:.6875rem;font-weight:500;color:var(--sb-accent,#818cf8)}
.sb-nav{flex:1;padding:20px .75rem 1rem;display:flex;flex-direction:column;gap:.25rem;overflow-y:auto}
.sb-section{font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2);padding:0 .875rem .375rem;margin-top:.75rem}
.sb-item{display:flex;align-items:center;gap:.75rem;padding:10px .875rem;border-radius:9999px;font-size:.875rem;font-weight:500;color:var(--muted);cursor:pointer;transition:.15s}
.sb-item:hover{background:var(--sb-accent-dim);color:var(--text)}
.sb-item.active{background:var(--sb-accent-dim);color:var(--sb-accent);font-weight:600;box-shadow:inset 3px 0 0 var(--sb-accent)}
.sb-item-icon{font-size:1.1rem;min-width:18px;display:flex;align-items:center;justify-content:center}

/* ── Content ── */
.content{grid-area:conteudo;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem}

/* ── Page header ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.page-title{display:flex;align-items:center;gap:.75rem}
.page-title-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;background:var(--sb-accent-dim);color:var(--sb-accent)}
.page-title h1{font-size:1.375rem;font-weight:700;letter-spacing:-.02em}
.page-title p{font-size:.8125rem;color:var(--muted);margin-top:.125rem}
.page-actions{display:flex;gap:.5rem}
.btn{display:inline-flex;align-items:center;gap:.375rem;padding:.5rem 1rem;border-radius:9999px;font-size:.8125rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-primary{background:var(--sb-accent,#818cf8);color:#fff}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.1)}

/* ── KPI cards ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.875rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.125rem;display:flex;flex-direction:column;gap:.5rem}
.kpi-label{font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2)}
.kpi-value{font-size:1.75rem;font-weight:800;letter-spacing:-.03em}
.kpi-delta{font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:.25rem}
.kpi-delta.up{color:#22c55e}.kpi-delta.down{color:#ef4444}.kpi-delta.warn{color:#f59e0b}

/* ── Table ── */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-card-title{font-size:.9375rem;font-weight:700}
table{width:100%;border-collapse:collapse}
th{font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted2);padding:.75rem 1.25rem;text-align:left;border-bottom:1px solid var(--border)}
td{font-size:.8125rem;padding:.875rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.04);color:var(--muted)}
tr:last-child td{border:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-flex;align-items:center;padding:.2rem .5rem;border-radius:9999px;font-size:.6875rem;font-weight:700}
.badge.green{background:rgba(34,197,94,.1);color:#22c55e}
.badge.amber{background:rgba(245,158,11,.1);color:#f59e0b}
.badge.red{background:rgba(239,68,68,.1);color:#ef4444}
.badge.blue{background:rgba(6,182,212,.1);color:#06b6d4}
.badge.purple{background:rgba(192,132,252,.1);color:#c084fc}

/* ── Switcher ── */
#switcher{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.95);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:9999px;padding:.375rem .5rem;display:flex;align-items:center;gap:.25rem;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.sw-btn{padding:.3rem .75rem;border-radius:9999px;border:none;background:transparent;color:var(--muted);font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.03em;transition:.15s;white-space:nowrap}
.sw-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.sw-btn.active{color:#fff;background:var(--sw-color,#818cf8)}
.sw-sep{width:1px;height:16px;background:rgba(255,255,255,.1);margin:0 .125rem}

/* ── HUB specific ── */
.hub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem}
.hub-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:.75rem}
.hub-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-1px)}
.hub-card-header{display:flex;align-items:center;justify-content:space-between}
.hub-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
.hub-card-status{font-size:.625rem;font-weight:800;letter-spacing:.05em;padding:.15rem .5rem;border-radius:9999px}
.hub-card-name{font-size:.9375rem;font-weight:700}
.hub-card-desc{font-size:.75rem;color:var(--muted);line-height:1.5}
.hub-card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:.5rem;border-top:1px solid var(--border)}
.hub-card-meta{font-size:.6875rem;color:var(--muted2)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:10px}
</style>
</head>

function hex2rgba(hex, alpha){
  const r=parseInt(hex.slice(1,3),16)
  const g=parseInt(hex.slice(3,5),16)
  const b=parseInt(hex.slice(5,7),16)
  return `rgba(${r},${g},${b},${alpha})`
}

function coreContent(z){

function renderZone(zoneKey){
  const z = ZONES[zoneKey]
  if(!z) return
  const color = z.color
  const dim   = hex2rgba(color,.08)
  const border= hex2rgba(color,.22)

  // CSS vars via inline style on body
  document.body.style.setProperty('--sb-accent', color)
  document.body.style.setProperty('--sb-accent-dim', dim)
  document.body.style.setProperty('--sb-accent-border', border)

  const isHub = zoneKey === 'hub'

  const app = document.getElementById('app')
  app.innerHTML = `
  <!-- HEADER -->
  <header class="header">
    <div class="h-left">
      <div class="h-logo">
        <svg width="20" height="20" viewBox="0 0 256 256" fill="${color}"><path d="M128 24l96 56v96l-96 56L32 176V80z" opacity=".3"/><path d="M128 24l96 56-96 56L32 80z" opacity=".6"/></svg>
        ${!isHub ? '<span class="h-logo-name">Gravity</span>' : ''}
      </div>
      ${!isHub ? '<div class="h-divider"></div>' : ''}
      <div class="h-chip" style="--chip-color:${color};--chip-bg:${dim};--chip-border:${border}">
        <span class="h-chip-icon">${z.icon}</span>
        ${z.name}
      </div>
    </div>
    <div class="h-right">
      <button class="h-icon" title="Buscar">🔍</button>
      <button class="h-icon" title="Dicas" style="color:${color}">💡</button>
      <button class="h-icon" title="Idioma">🌐</button>
      <button class="h-icon" title="Localizador">⊹</button>
      <div class="h-sep"></div>
      ${!z.hideHub ? `<button class="h-nav-btn" style="--nb-color:#818cf8;--nb-bg:rgba(129,140,248,.08);--nb-border:rgba(129,140,248,.22);--nb-bg-h:rgba(129,140,248,.16);--nb-border-h:rgba(129,140,248,.4)">⬡ Hub</button>` : ''}
      ${!z.hideCore ? `<button class="h-nav-btn" style="--nb-color:${color};--nb-bg:${dim};--nb-border:${border};--nb-bg-h:${hex2rgba(color,.18)};--nb-border-h:${hex2rgba(color,.45)}">◈ Core</button>` : ''}
      <div class="h-sep"></div>
      <div class="h-avatar">DS</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-logo-area">
      <svg width="26" height="26" viewBox="0 0 256 256" fill="${color}"><path d="M128 24l96 56v96l-96 56L32 176V80z" opacity=".3"/><path d="M128 24l96 56-96 56L32 80z" opacity=".6"/></svg>
      <div class="sb-chip">
        <span class="sb-chip-dot"></span>
        <span class="sb-chip-label">${z.name.toUpperCase()}</span>
      </div>
    </div>
    <div class="sb-tenant">
      <div class="sb-avatar">G</div>
      <div class="sb-tenant-info">
        <span class="sb-tenant-name">Gravity Soluções</span>
        <span class="sb-tenant-plan">Plano Pro</span>
      </div>
    </div>
    <nav class="sb-nav">
      ${z.nav.map(item=>`
        <div class="sb-item ${item.active?'active':''}">
          <span class="sb-item-icon">${item.icon}</span>
          <span>${item.label}</span>
          ${item.children ? '<span style="margin-left:auto;font-size:.7rem">∨</span>' : ''}
        </div>
      `).join('')}
    </nav>
  </aside>

  <!-- CONTENT -->
  <main class="content">
    ${z.content({...z, zone:zoneKey})}
  </main>`

  // Update switcher active state
  document.querySelectorAll('.sw-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.zone === zoneKey)
  })
}

// Init
document.querySelectorAll('.sw-btn').forEach(btn => {
  btn.addEventListener('click', () => renderZone(btn.dataset.zone))
})

renderZone('hub')
