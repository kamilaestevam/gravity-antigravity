<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #6366f1; /* Botão primário original do CSS pede 6366f1, hover 4f46e5 */
            --color-primary-hover: #4f46e5;
            --color-text: #f1f5f9;
            --color-text-muted: #94a3b8;
            --color-surface: rgba(255, 255, 255, 0.1);
            --color-surface-2: rgba(255, 255, 255, 0.06);
            --color-border: rgba(255, 255, 255, 0.12);
            --font: 'Inter', sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        .story-container {
            background: #1e293b;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: inline-flex;
            flex-direction: column;
            gap: 20px;
        }
        .story-row {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .story-label {
            width: 120px;
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        
        /* ── Base ─────────────────────────────────────────────────────────────────── */
        .gb-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;        /* pill */
            font-size: 0.875rem;
            font-weight: 600;
            line-height: 1;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid transparent;
            font-family: var(--font, 'Inter', sans-serif);
            transition: all 0.18s ease;
            text-decoration: none;
            outline: none;
            position: relative;
            letter-spacing: 0.015em;
            user-select: none;
        }
        .gb-btn--com-icone { padding-left: 0.3125rem; }
        .gb-btn__icon-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.625rem;       /* 26px */
            height: 1.625rem;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background 0.18s ease;
        }
        
        /* Primario */
        .gb-btn--primario {
            background: var(--color-primary, #6366f1);
            color: #ffffff;
            border-color: transparent;
            box-shadow: 0 1px 3px rgba(99, 102, 241, 0.25);
        }
        .gb-btn--primario .gb-btn__icon-badge {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }
        
        /* Secundario */
        .gb-btn--secundario {
            background: var(--color-surface-2, rgba(255, 255, 255, 0.06));
            color: var(--color-text, #f1f5f9);
            border-color: var(--color-border, rgba(255, 255, 255, 0.12));
        }
        .gb-btn--secundario .gb-btn__icon-badge {
            background: rgba(255, 255, 255, 0.08);
            color: #818cf8; /* color primary local hardcoded na variant */
        }
        
        /* Fantasma */
        .gb-btn--fantasma {
            background: transparent;
            color: var(--color-text-muted, #94a3b8);
            border-color: var(--color-border, rgba(255, 255, 255, 0.1));
        }
        .gb-btn--fantasma .gb-btn__icon-badge {
            background: rgba(255, 255, 255, 0.06);
            color: inherit;
        }
        
        /* Perigo */
        .gb-btn--perigo {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.25);
        }
        .gb-btn--perigo .gb-btn__icon-badge {
            background: rgba(239, 68, 68, 0.18);
            color: #f87171;
        }

        /* SVG fake icons to emulate Phosphor React Icons using same svg paths */
        svg.ph { width: 14px; height: 14px; fill: currentColor; }
    </style>
</head>
<body id="botoes-capture">

    <div class="story-container" id="capture-estados">
        <div class="story-row">
            <span class="story-label">Primário</span>
            <button class="gb-btn gb-btn--primario gb-btn--com-icone">
                <span class="gb-btn__icon-badge">
                   <!-- Plus icon -->
                   <svg class="ph" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"></path></svg>
                </span>
                Nova Empresa
            </button>
            <button class="gb-btn gb-btn--primario">
                Gravar
            </button>
        </div>

        <div class="story-row">
            <span class="story-label">Secundário</span>
            <button class="gb-btn gb-btn--secundario gb-btn--com-icone">
                <span class="gb-btn__icon-badge">
                   <!-- Arrow icon -->
                   <svg class="ph" viewBox="0 0 256 256"><path d="M221.66,133.66l-72,72a8,8,0,0,1-11.32-11.32L196.69,136H40a8,8,0,0,1,0-16H196.69L138.34,61.66a8,8,0,0,1,11.32-11.32l72,72A8,8,0,0,1,221.66,133.66Z"></path></svg>
                </span>
                Gerenciar Acessos
            </button>
            <button class="gb-btn gb-btn--secundario">
                Cancelar
            </button>
        </div>

        <div class="story-row">
            <span class="story-label">Fantasma</span>
            <button class="gb-btn gb-btn--fantasma gb-btn--com-icone">
                <span class="gb-btn__icon-badge">
                   <!-- Copy icon -->
                   <svg class="ph" viewBox="0 0 256 256"><path d="M216,40V168a8,8,0,0,1-16,0V48H72a8,8,0,0,1,0-16H208A8,8,0,0,1,216,40ZM168,72H40A16,16,0,0,0,24,88V216a16,16,0,0,0,16,16H168a16,16,0,0,0,16-16V88A16,16,0,0,0,168,72Zm0,144H40V88H168V216Z"></path></svg>
                </span>
                Copiar Chave
            </button>
            <button class="gb-btn gb-btn--fantasma">
                Editar
            </button>
        </div>

        <div class="story-row">
            <span class="story-label">Perigo</span>
            <button class="gb-btn gb-btn--perigo gb-btn--com-icone">
                <span class="gb-btn__icon-badge">
                   <!-- Trash icon -->
                   <svg class="ph" viewBox="0 0 256 256"><path d="M216,48H176V40a24,24,0,0,0-24-24H104A24,24,0,0,0,80,40v8H40a8,8,0,0,0,0,16h8V208a16,16,0,0,0,16,16H192a16,16,0,0,0,16-16V64h8a8,8,0,0,0,0-16ZM96,40a8,8,0,0,1,8-8h48a8,8,0,0,1,8,8v8H96Zm96,168H64V64H192ZM112,104v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Zm48,0v64a8,8,0,0,1-16,0V104a8,8,0,0,1,16,0Z"></path></svg>
                </span>
                Excluir Área
            </button>
            <button class="gb-btn gb-btn--perigo">
                Excluir
            </button>
        </div>
    </div>

</body>
</html>
