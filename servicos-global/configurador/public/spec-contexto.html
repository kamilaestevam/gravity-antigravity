<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS EXATO DO COMPONENTE REAL - Base Mínima */
        :root {
            --color-primary: #6366f1;
            --color-primary-hover: #4f46e5;
            --font: 'Inter', sans-serif;
        }
        
        body { background: #f8fafc; color: #1e293b; padding: 60px; font-family: 'Inter', sans-serif; margin: 0; }
        .sheet-header { border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 40px; }
        .sheet-title { font-size: 24px; font-weight: 800; text-transform: uppercase; color: #0f172a; margin: 0; }
        
        .gb-btn {
            display: inline-flex; align-items: center; gap: 0.625rem;
            padding: 0.5rem 1.25rem; border-radius: 9999px; font-size: 0.875rem;
            font-weight: 600; line-height: 1; white-space: nowrap; cursor: pointer;
            border: 1px solid transparent; font-family: var(--font);
            transition: all 0.18s ease; text-decoration: none; position: relative;
        }
        .gb-btn--com-icone { padding-left: 0.3125rem; }
        .gb-btn__icon-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 1.625rem; height: 1.625rem; border-radius: 50%; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.15); color: #ffffff;
        }
        .gb-btn--primario { background: var(--color-primary); color: #ffffff; box-shadow: 0 1px 3px rgba(99, 102, 241, 0.25); }
        svg.ph { width: 14px; height: 14px; fill: currentColor; }

        /* MOCK DA APLICAÇÃO (GRAVITY SHELL) */
        .app-window {
            background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 800px; height: 500px; position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .app-header { height: 48px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 24px; font-weight: 600; color: #64748b;}
        .app-body { padding: 32px 24px; flex: 1; display: flex; flex-direction: column;}
        
        .cards-row { display: flex; gap: 16px; margin-bottom: 32px; border-bottom: 1px solid #ef4444; padding-bottom: 8px; position: relative; }
        .card { flex: 1; border: 1px solid #e2e8f0; border-radius: 6px; padding: 16px; height: 60px; }
        
        .table-area { border: 1px solid #e2e8f0; border-radius: 6px; flex: 1; background: #f8fafc; }

        /* BUTTON WRAPPER / ALINHAMENTO */
        .action-bar {
            display: flex; justify-content: flex-end; margin-bottom: 16px;
            /* Isso simula o alinhamento da tabela contra a barra de ação (gap 16px) */
            position: relative;
        }

        /* ANNOTATIONS */
        .annot-line-red { position: absolute; background: #ef4444; }
        .annot-label { position: absolute; color: #ef4444; font-family: monospace; font-size: 13px; font-weight: 600; white-space: nowrap;}
        
        /* Gap com tabela */
        .gap-16 { width: 1px; height: 16px; right: 80px; bottom: -16px;}
        .gap-16::before, .gap-16::after { content: ''; position: absolute; background: #ef4444; width: 6px; height: 1px; left: -3px; }
        .gap-16::before { top: 0; } .gap-16::after { bottom: 0; }
        
        /* Align Right Base Cards */
        .align-y { width: 100%; height: 1px; bottom: -1px; left: 0;}
        .align-y-arrow { right: 0; top: -5px; width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 5px solid #ef4444; position: absolute;}

    </style>
</head>
<body>

    <div class="sheet-header">
        <h1 class="sheet-title">Técnico/Contextual - Ancoragem do BotaoGlobal</h1>
    </div>

    <div class="app-window">
        <div class="app-header">Gravity Shell - Área Principal</div>
        <div class="app-body">
            
            <div class="cards-row">
                <div class="card"></div><div class="card"></div><div class="card"></div>
                <!-- linha vermelha na base dos cards simulando alinhamento vertical -->
                <div class="annot-line-red align-y"></div>
                <div class="annot-label" style="bottom: -25px; left: 0;">&larr; Ancoragem: Base dos StatCards (Y)</div>
            </div>

            <div class="action-bar">
                <button class="gb-btn gb-btn--primario gb-btn--com-icone">
                    <span class="gb-btn__icon-badge">
                        <svg class="ph" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"></path></svg>
                    </span>
                    Nova Empresa
                </button>
                
                <div class="annot-line-red gap-16"></div>
                <div class="annot-label" style="bottom: -15px; right: 90px;">Gap Vertical: 16px (p-4)</div>

                <div class="annot-label" style="top: -25px; right: 0;">Ancorado à Direita &rarr;</div>
            </div>

            <div class="table-area"></div>
        </div>

        <div class="annot-line-red" style="width: 1px; top: 0; bottom: 0; right: 24px;"></div>
        <div class="annot-label" style="top: 150px; right: 30px;">Margem do Painel (24px)</div>

    </div>

</body>
</html>
