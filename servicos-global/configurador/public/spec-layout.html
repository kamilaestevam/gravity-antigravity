<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS EXATO DO COMPONENTE REAL */
        :root {
            --color-primary: #6366f1;
            --color-primary-hover: #4f46e5;
            --color-text: #f1f5f9;
            --color-text-muted: #94a3b8;
            --color-surface: rgba(255, 255, 255, 0.1);
            --color-surface-2: rgba(255, 255, 255, 0.06);
            --color-border: rgba(255, 255, 255, 0.12);
            --font: 'Inter', sans-serif;
        }
        
        .gb-btn {
            display: inline-flex; align-items: center; gap: 0.625rem;
            padding: 0.5rem 1.25rem; border-radius: 9999px; font-size: 0.875rem;
            font-weight: 600; line-height: 1; white-space: nowrap; cursor: pointer;
            border: 1px solid transparent; font-family: var(--font);
            transition: all 0.18s ease; text-decoration: none; position: relative;
        }
        .gb-btn--com-icone { padding-left: 0.3125rem; }
        .gb-btn__icon-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 1.625rem; height: 1.625rem; border-radius: 50%; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.15); color: #ffffff;
        }
        .gb-btn--primario { background: var(--color-primary); color: #ffffff; box-shadow: 0 1px 3px rgba(99, 102, 241, 0.25); }
        svg.ph { width: 14px; height: 14px; fill: currentColor; }

        /* ESTILOS DA FOLHA DE LAYOUT */
        body { background: #ffffff; color: #1e293b; padding: 60px; font-family: 'Inter', sans-serif; margin: 0; }
        .grid-bg { 
            position: relative; padding: 120px; border: 1px solid #e2e8f0; 
            background-image: linear-gradient(#f1f5f9 1px, transparent 1px), linear-gradient(90deg, #f1f5f9 1px, transparent 1px);
            background-size: 20px 20px; display: inline-block;
        }

        .layout-wrapper {
            position: relative;
            display: inline-flex;
            border: 1px dashed #ef4444; 
            padding: 0;
        }
        
        /* ANNOTATION LINES */
        .measure-line { position: absolute; background: #ef4444; }
        .measure-line::before, .measure-line::after { content: ''; position: absolute; background: #ef4444; }
        .measure-label { position: absolute; color: #ef4444; font-family: monospace; font-size: 13px; font-weight: 600; background: #fff; padding: 2px 4px; border-radius: 2px;}

        /* Arrow Top (Padding top) */
        .arr-t { width: 1px; height: 8px; top: 0; left: 50%; }
        .arr-t::before, .arr-t::after { width: 4px; height: 1px; top: 0; left: -1.5px; }
        
        /* The specific annotations for the button */
        .annot-box { position: absolute; border: 1px solid #3b82f6; background: rgba(59, 130, 246, 0.1); pointer-events: none; }
        
        /* Outline around the gap */
        .gap-highlight {
            position: absolute; width: 10px; height: 26px; left: 31px; top: 8px; background: rgba(239, 68, 68, 0.2); border: 1px dashed #ef4444;
        }
        .gap-label { position: absolute; bottom: -25px; left: 16px; color: #ef4444; font-family: monospace; font-weight: 600; font-size: 12px; white-space: nowrap}

        /* Outline around badge */
        .badge-box {
            position: absolute; width: 26px; height: 26px; left: 5px; top: 8px; border: 1px solid #10b981; border-radius: 50%;
        }
        .badge-label { position: absolute; top: -25px; left: -10px; color: #10b981; font-family: monospace; font-weight: 600; font-size: 12px; white-space: nowrap}
        
        /* Height line */
        .h-line { position: absolute; width: 1px; height: 42px; right: -20px; top: 0; border-right: 1px solid #ef4444;}
        .h-line::before { content: ''; position: absolute; top: 0; right: -3px; width: 6px; height: 1px; background: #ef4444;}
        .h-line::after { content: ''; position: absolute; bottom: 0; right: -3px; width: 6px; height: 1px; background: #ef4444;}
        .h-label { position: absolute; top: 12px; right: -65px; color: #ef4444; font-family: monospace; font-weight: 600; font-size: 12px;}

    </style>
</head>
<body>

    <h2 style="font-weight: 800; text-transform: uppercase;">Blueprint: Layout de Composição (Botão Global - Com Ícone)</h2>
    <p style="color:#64748b; margin-bottom: 40px; font-family: monospace;">Fidedigno ao código real: height: 42px (0.5rem top/bot), gap: 0.625rem (10px)</p>

    <div class="grid-bg">
        <div class="layout-wrapper">
            <button class="gb-btn gb-btn--primario gb-btn--com-icone">
                <span class="gb-btn__icon-badge">
                    <svg class="ph" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H136v80a8,8,0,0,1-16,0V136H40a8,8,0,0,1,0-16h80V40a8,8,0,0,1,16,0v80h80A8,8,0,0,1,224,128Z"></path></svg>
                </span>
                Ação Primária
            </button>
            
            <div class="gap-highlight">
                <div class="gap-label">&larr; 10px &rarr;<br>(Gap)</div>
            </div>
            
            <div class="badge-box">
                <div class="badge-label">26x26px<br>(Badge)</div>
            </div>

            <div class="h-line">
                <div class="h-label">42px<br>(Height)</div>
            </div>

            <div style="position: absolute; bottom: -45px; right: 0; border-bottom: 1px solid #ef4444; width: 20px; border-right: 1px solid #ef4444; height: 45px; border-bottom-right-radius: 4px;"></div>
            <div style="position: absolute; bottom: -53px; right: 28px; color: #ef4444; font-family: monospace; font-size: 12px; font-weight:600;">Padding Right: 1.25rem (20px)</div>

            <div style="position: absolute; bottom: -45px; left: 0; border-bottom: 1px solid #10b981; width: 5px; border-left: 1px solid #10b981; height: 45px; border-bottom-left-radius: 4px;"></div>
            <div style="position: absolute; bottom: -53px; left: -90px; color: #10b981; font-family: monospace; font-size: 12px; font-weight:600;">Padding Left: 5px</div>
        </div>
    </div>

</body>
</html>
