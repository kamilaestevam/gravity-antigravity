<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimulaCusto — Gravity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #1f262f;
      --border: #30363d; --primary: #6366f1; --primary-h: #818cf8;
      --text: #e6edf3; --muted: #8b949e; --success: #3fb950;
      --warning: #d29922; --danger: #f85149; --radius: 10px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .app { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
    .logo { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--primary-h)); border-radius: 12px; display: grid; place-items: center; font-size: 22px; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { color: var(--muted); font-size: 0.875rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
    .card h2 { font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 1rem; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .field label { display: block; font-size: 0.8125rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; }
    .field input, .field select {
      width: 100%; padding: 0.625rem 0.875rem; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 0.9375rem; font-family: inherit; transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--primary); }

    .item-row { display: grid; grid-template-columns: 1.2fr 2fr 80px 110px 40px; gap: 0.5rem; align-items: center; margin-bottom: 0.625rem; }
    .item-row input, .item-row select { padding: 0.5rem 0.625rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.875rem; }
    .item-row button { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; height: 36px; transition: all 0.15s; display: grid; place-items: center; }
    .item-row button:hover { border-color: var(--danger); color: var(--danger); }

    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 8px; font-family: inherit; font-size: 0.9375rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--primary); }
    .btn-primary { background: var(--primary); border: none; color: white; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btns { display: flex; gap: 0.75rem; margin-top: 1rem; }

    .result { margin-top: 1.5rem; }
    .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
    .kpi .label { font-size: 0.8125rem; color: var(--muted); margin-bottom: 0.25rem; }
    .kpi .value { font-size: 1.5rem; font-weight: 700; }
    .kpi.total .value { color: var(--success); }
    .kpi.desc .value { color: var(--warning); }

    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead tr { background: var(--surface2); }
    th { text-align: left; padding: 0.625rem 1rem; color: var(--muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .pct-bar { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 4px; }
    .pct-fill { background: var(--primary); height: 100%; border-radius: 4px; }

    .error { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: 8px; padding: 0.875rem 1rem; color: var(--danger); margin-top: 1rem; font-size: 0.9rem; }
    .no-result { display: none; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">🧮</div>
    <div>
      <h1>SimulaCusto</h1>
      <p>Simule o custo de qualquer serviço antes de contratar.</p>
    </div>
  </header>

  <div class="card">
    <h2>Dados da Simulação</h2>
    <div class="grid-2">
      <div class="field">
        <label for="tenantId">Tenant ID</label>
        <input id="tenantId" placeholder="tenant-abc" value="tenant-demo" />
      </div>
      <div class="field">
        <label for="nomeServico">Nome do Serviço</label>
        <input id="nomeServico" placeholder="ERP Cloud" value="ERP Cloud" />
      </div>
      <div class="field">
        <label for="desconto">Desconto (%)</label>
        <input type="number" id="desconto" min="0" max="100" value="10" />
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Itens de Custo</h2>
    <div id="itens"></div>
    <div class="btns">
      <button class="btn btn-ghost" onclick="adicionarItem()">+ Adicionar Item</button>
      <button class="btn btn-primary" id="btn-simular" onclick="simular()">🚀 Simular Custo</button>
    </div>
    <div id="erro"></div>
  </div>

  <div id="resultado" class="no-result">
    <div class="kpis">
      <div class="kpi">
        <div class="label">Subtotal Bruto</div>
        <div class="value" id="kpi-bruto">—</div>
      </div>
      <div class="kpi desc">
        <div class="label">Desconto Aplicado</div>
        <div class="value" id="kpi-desc">—</div>
      </div>
      <div class="kpi total">
        <div class="label">Total Final</div>
        <div class="value" id="kpi-total">—</div>
      </div>
    </div>
    <div class="card">
      <h2>Breakdown por Categoria</h2>
      <table>
        <thead>
          <tr><th>Categoria</th><th>Descrição</th><th>Subtotal</th><th style="width:180px">% do Total</th></tr>
        </thead>
        <tbody id="tabela-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const CATEGORIAS = ['infraestrutura','suporte','licenca','integracao','customizacao']
  let itens = [{ categoria: 'infraestrutura', descricao: 'Servidor Cloud', quantidade: 2, precoUnitario: 500 }]

  function renderItens() {
    const cont = document.getElementById('itens')
    cont.innerHTML = itens.map((it, i) => `
      <div class="item-row">
        <select onchange="upd(${i},'categoria',this.value)">
          ${CATEGORIAS.map(c => `<option value="${c}" ${c===it.categoria?'selected':''}>${c}</option>`).join('')}
        </select>
        <input placeholder="Descrição" value="${it.descricao}" oninput="upd(${i},'descricao',this.value)" />
        <input type="number" min="1" value="${it.quantidade}" oninput="upd(${i},'quantidade',+this.value)" />
        <input type="number" min="0" step="0.01" placeholder="R$ unit." value="${it.precoUnitario}" oninput="upd(${i},'precoUnitario',+this.value)" />
        <button onclick="remover(${i})" ${itens.length===1?'disabled':''}>🗑</button>
      </div>`).join('')
  }

  function upd(i, campo, valor) { itens[i][campo] = valor }
  function adicionarItem() { itens.push({categoria:'licenca',descricao:'',quantidade:1,precoUnitario:0}); renderItens() }
  function remover(i) { if(itens.length>1){ itens.splice(i,1); renderItens() } }

  async function simular() {
    const btn = document.getElementById('btn-simular')
    document.getElementById('erro').innerHTML = ''
    btn.disabled = true; btn.textContent = '⏳ Calculando...'
    try {
      const res = await fetch('/api/v1/simula-custo', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          tenantId: document.getElementById('tenantId').value,
          nomeServico: document.getElementById('nomeServico').value,
          itens: itens.map(it => ({...it})),
          descontoPercentual: +document.getElementById('desconto').value
        })
      })
      const json = await res.json()
      if (!res.ok) throw new Error(json.error ?? 'Erro na simulação')
      mostrarResultado(json.data)
    } catch(e) {
      document.getElementById('erro').innerHTML = `<div class="error">❌ ${e.message}</div>`
    } finally {
      btn.disabled = false; btn.textContent = '🚀 Simular Custo'
    }
  }

  function fmt(v) { return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2}) }

  function mostrarResultado(d) {
    document.getElementById('kpi-bruto').textContent = fmt(d.subtotalBruto)
    document.getElementById('kpi-desc').textContent = '- ' + fmt(d.descontoValor)
    document.getElementById('kpi-total').textContent = fmt(d.totalFinal)
    const tbody = document.getElementById('tabela-body')
    tbody.innerHTML = d.breakdown.map(b => `
      <tr>
        <td><strong>${b.categoria}</strong></td>
        <td>${b.descricao}</td>
        <td>${fmt(b.subtotal)}</td>
        <td>
          <span>${b.percentualDoTotal.toFixed(1)}%</span>
          <div class="pct-bar"><div class="pct-fill" style="width:${b.percentualDoTotal}%"></div></div>
        </td>
      </tr>`).join('')
    const el = document.getElementById('resultado')
    el.style.display = 'block'; el.classList.remove('no-result')
    el.scrollIntoView({behavior:'smooth'})
  }

  renderItens()
</script>
</body>
</html>
